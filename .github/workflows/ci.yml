name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-cuotiben-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
        env:
          DEEPSEEK_API_KEY: "sk-skip"
          GEMINI_API_KEY: "g-skip"
          JWT_SECRET: "ci-secret-not-used-in-prod"
          SQL_ECHO: "0"

  frontend:
    name: Frontend — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-cuotiben-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Run tests
        run: npx vitest run
