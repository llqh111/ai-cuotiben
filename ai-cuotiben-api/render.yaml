# Render 免费部署配置
# 使用方法：在 Render Dashboard → New Web Service → Connect this repo
# 或直接 push 到 GitHub 后 Render 自动检测此文件

services:
  - type: web
    name: ai-cuotiben-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-cuotiben-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
    buildFilter:
      paths:
        - ai-cuotiben-api/**
    plan: free

databases:
  - name: ai-cuotiben-db
    plan: free
